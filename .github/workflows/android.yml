name: Build Android APK

"on":
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: python3 scripts/validate_project.py

      - name: Parse GDScript files
        run: |
          python3 -m pip install --disable-pip-version-check gdtoolkit==4.5.0
          gdlint autoload scripts

      - name: Install Godot runtime for battle smoke test
        shell: bash
        run: |
          set -euo pipefail
          GODOT_DIR="$RUNNER_TEMP/boomarena-godot"
          mkdir -p "$GODOT_DIR"
          curl -L --fail --retry 3 \
            -o "$GODOT_DIR/godot.zip" \
            "https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable/Godot_v4.7.1-stable_linux.x86_64.zip"
          unzip -q "$GODOT_DIR/godot.zip" -d "$GODOT_DIR"
          GODOT_BIN="$(find "$GODOT_DIR" -maxdepth 2 -type f -name 'Godot_v4.7.1-stable_linux.x86_64' -print -quit)"
          test -n "$GODOT_BIN"
          chmod +x "$GODOT_BIN"
          echo "GODOT_SMOKE_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          "$GODOT_BIN" --version

      - name: Import Godot resources
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          timeout 120s "$GODOT_SMOKE_BIN" --headless --path . --import 2>&1 | tee godot-import.log
          test -d .godot/imported
          test -n "$(find .godot/imported -type f -name 'grenade.wav-*' -print -quit)"
          if grep -E "SCRIPT ERROR|Parse Error|Failed to load script" godot-import.log; then
            echo "ERROR: Godot reported script errors during resource import."
            exit 1
          fi

      - name: Run real battle scene smoke test
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          timeout 35s "$GODOT_SMOKE_BIN" --headless --path . -- --smoke-test 2>&1 | tee smoke-test.log
          grep -q "BOOM_ARENA_SMOKE_TEST_OK" smoke-test.log
          if grep -E "SCRIPT ERROR|Parse Error|Failed to load script" smoke-test.log; then
            echo "ERROR: Godot reported script errors during the battle smoke test."
            exit 1
          fi

      - name: Run training ground smoke test
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          timeout 35s "$GODOT_SMOKE_BIN" --headless --path . -- --smoke-training 2>&1 | tee training-smoke-test.log
          grep -q "BOOM_ARENA_TRAINING_SMOKE_TEST_OK" training-smoke-test.log
          if grep -E "SCRIPT ERROR|Parse Error|Failed to load script" training-smoke-test.log; then
            echo "ERROR: Godot reported script errors during the training smoke test."
            exit 1
          fi

      - name: Upload Godot logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: BoomArena-Godot-Test-Logs
          path: |
            godot-import.log
            smoke-test.log
            training-smoke-test.log
          if-no-files-found: warn
          retention-days: 14

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: sdkmanager "platform-tools" "build-tools;35.0.1" "platforms;android-35" "cmdline-tools;latest" "cmake;3.10.2.4988404" "ndk;28.1.13356709"

      - name: Configure Godot Android paths
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF

      - name: Configure stable prototype signing key
        run: |
          test -s signing/boomarena-debug.keystore
          keytool -list \
            -keystore signing/boomarena-debug.keystore \
            -storepass boomarena \
            -alias boomarena
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$GITHUB_WORKSPACE/signing/boomarena-debug.keystore" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=boomarena" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=boomarena" >> "$GITHUB_ENV"

      - name: Prepare export directory
        run: |
          rm -rf build artifacts
          mkdir -p build artifacts

      - name: Export Android APK
        id: export
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable/Godot_v4.7.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable/Godot_v4.7.1-stable_export_templates.tpz
          relative_project_path: ./
          presets_to_export: Android
          export_debug: true
          cache: true
          use_preset_export_path: true
          verbose: true

      - name: Locate, verify and stage APK
        shell: bash
        run: |
          set -euo pipefail

          echo "Files created by the export action:"
          find build -maxdepth 4 -type f -print | sort

          APK_PATH="$(find build -type f -name 'BoomArena-debug.apk' -print -quit)"
          if [ -z "$APK_PATH" ]; then
            APK_PATH="$(find build -type f -name '*.apk' -print -quit)"
          fi
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: Android APK was not found under build/."
            exit 1
          fi

          echo "APK_PATH=$APK_PATH"
          test -s "$APK_PATH"
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/apksigner" verify --verbose "$APK_PATH"
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/aapt" dump badging "$APK_PATH" > artifacts/apk-badging.txt
          head -n 20 artifacts/apk-badging.txt

          cp "$APK_PATH" artifacts/BoomArena-debug.apk
          if [ -f godot-import.log ]; then
            cp godot-import.log artifacts/godot-import.log
          fi
          if [ -f smoke-test.log ]; then
            cp smoke-test.log artifacts/smoke-test.log
          fi
          if [ -f training-smoke-test.log ]; then
            cp training-smoke-test.log artifacts/training-smoke-test.log
          fi
          test -s artifacts/BoomArena-debug.apk
          sha256sum artifacts/BoomArena-debug.apk | tee artifacts/BoomArena-debug.apk.sha256
          ls -lh artifacts/BoomArena-debug.apk artifacts/BoomArena-debug.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoomArena-Android-APK
          path: |
            artifacts/BoomArena-debug.apk
            artifacts/BoomArena-debug.apk.sha256
            artifacts/apk-badging.txt
            artifacts/godot-import.log
            artifacts/smoke-test.log
            artifacts/training-smoke-test.log
          if-no-files-found: error
          retention-days: 14
