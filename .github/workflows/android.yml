name: Build Android APK

"on":
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: python3 scripts/validate_project.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: sdkmanager "platform-tools" "build-tools;35.0.1" "platforms;android-35" "cmdline-tools;latest" "cmake;3.10.2.4988404" "ndk;28.1.13356709"

      - name: Configure Godot Android paths
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF

      - name: Create debug signing key
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Boom Arena,C=DE"
          fi
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$HOME/.android/debug.keystore" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> "$GITHUB_ENV"

      - name: Prepare export directory
        run: mkdir -p build

      - name: Export Android APK
        id: export
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable/Godot_v4.7.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable/Godot_v4.7.1-stable_export_templates.tpz
          relative_project_path: ./
          presets_to_export: Android
          export_debug: true
          cache: true
          use_preset_export_path: true
          verbose: true

      - name: Verify generated APK
        run: |
          test -f build/BoomArena-debug.apk
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/apksigner" verify --verbose build/BoomArena-debug.apk
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/aapt" dump badging build/BoomArena-debug.apk | head -n 20
          mkdir -p artifacts
          cp build/BoomArena-debug.apk artifacts/BoomArena-debug.apk
          ls -lh artifacts/BoomArena-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoomArena-Android-APK
          path: artifacts/BoomArena-debug.apk
          if-no-files-found: error
